<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Action Step Planner Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* Input Section */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 45px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    /* Dynamic Row Styling */
    .dynamic-container {
        background: rgba(255, 255, 255, 0.03);
        padding: 20px;
        border-radius: 15px;
        border: 1px dashed var(--card-border);
        margin-top: 10px;
    }

    .dynamic-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 15px;
        animation: fadeIn 0.3s ease-out;
    }

    .add-btn {
      background: var(--accent-primary);
      color: #020617;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      font-size: 0.85rem;
      margin-top: 10px;
    }

    .add-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    /* Output Card */
    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 1rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .dynamic-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Action Step Planner</h1>
    </header>

    <div class="input-section">
      <!-- Top Static Row -->
      <div class="grid-row">
        <div class="input-group">
          <label>Step Name</label>
          <textarea id="stepIn" oninput="updatePrompt()"></textarea>
        </div>
        <div class="input-group">
          <label>Activity Name</label>
          <textarea id="activityIn" oninput="updatePrompt()"></textarea>
        </div>
        <div class="input-group">
          <label>Source of Getting Idea</label>
          <textarea id="sourceIn" oninput="updatePrompt()"></textarea>
        </div>
      </div>

      <!-- Dynamic Prompts Section -->
      <div class="dynamic-container">
        <label style="margin-bottom:10px; display:block;">Prompts List</label>
        <div id="promptListContainer">
            <div class="dynamic-row">
                <div class="input-group">
                    <label>Prompt Name</label>
                    <textarea class="prompt-name" oninput="updatePrompt()"></textarea>
                </div>
                <div class="input-group">
                    <label>Prompt URL</label>
                    <textarea class="prompt-url" oninput="updatePrompt()"></textarea>
                </div>
            </div>
        </div>
        <button class="add-btn" onclick="addRow('promptListContainer', 'Prompt')">+ Add More Prompts</button>
      </div>

      <!-- Dynamic Tools Section -->
      <div class="dynamic-container">
        <label style="margin-bottom:10px; display:block;">Tools List</label>
        <div id="toolListContainer">
            <div class="dynamic-row">
                <div class="input-group">
                    <label>Tool Name</label>
                    <textarea class="tool-name" oninput="updatePrompt()"></textarea>
                </div>
                <div class="input-group">
                    <label>Tool URL</label>
                    <textarea class="tool-url" oninput="updatePrompt()"></textarea>
                </div>
            </div>
        </div>
        <button class="add-btn" onclick="addRow('toolListContainer', 'Tool')">+ Add More Tools</button>
      </div>

      <!-- Bottom Static Box -->
      <div class="input-group">
        <label>Technique/Process</label>
        <textarea id="processIn" style="min-height: 120px;" oninput="updatePrompt()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Generated Action Step</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading...</div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Formatted Step</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function addRow(containerId, type) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `
            <div class="input-group">
                <label>${type} Name</label>
                <textarea class="${type.toLowerCase()}-name" oninput="updatePrompt()"></textarea>
            </div>
            <div class="input-group">
                <label>${type} URL</label>
                <textarea class="${type.toLowerCase()}-url" oninput="updatePrompt()"></textarea>
            </div>
        `;
        container.appendChild(div);
        updatePrompt();
    }

    function updatePrompt() {
      const step = document.getElementById('stepIn').value || "[Step Name]";
      const activity = document.getElementById('activityIn').value || "[Activity Name]";
      const source = document.getElementById('sourceIn').value || "[Source of Getting Idea]";
      const process = document.getElementById('processIn').value || "[TECHNIQUE/PROCESS]";

      // Build Prompts List
      let promptsText = "";
      const pNames = document.querySelectorAll('.prompt-name');
      const pUrls = document.querySelectorAll('.prompt-url');
      pNames.forEach((nameEl, index) => {
          const n = nameEl.value.trim() || "[Prompt Name]";
          const u = pUrls[index].value.trim() || "[Prompt URL]";
          promptsText += `${n} - ${u}\n`;
      });

      // Build Tools List
      let toolsText = "";
      const tNames = document.querySelectorAll('.tool-name');
      const tUrls = document.querySelectorAll('.tool-url');
      tNames.forEach((nameEl, index) => {
          const n = nameEl.value.trim() || "[Tool Name]";
          const u = tUrls[index].value.trim() || "[Tool URL]";
          toolsText += `${n} - ${u}\n`;
      });

      const fullPrompt = `Step#: ${step}

Activity: ${activity}

Source: ${source}

List of Tools and Prompts: 

${promptsText}${toolsText}
TECHNIQUE/PROCESS

${process}`;

      document.getElementById('finalPrompt').innerText = fullPrompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize
    updatePrompt();
  </script>
</body>
</html>
