<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Context Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .full-width {
      grid-column: span 2;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 60px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      .input-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Product Details As Context</h1>
      <p class="sub-header">Unified Knowledge Base for AI Content Generation</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Landing Page Link</label>
        <textarea id="val1" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Name of Prompt Bundle</label>
        <textarea id="val2" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Tagline</label>
        <textarea id="val3" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Description</label>
        <textarea id="val4" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Type of Product</label>
        <textarea id="val5" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Audience</label>
        <textarea id="val6" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Graphy's Title</label>
        <textarea id="val9" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group">
        <label>Graphy's Description</label>
        <textarea id="val10" oninput="updatePrompt()"></textarea>
      </div>
      <div class="input-group full-width">
        <label>AIDA Positioning</label>
        <textarea id="val7" oninput="updatePrompt()" style="min-height: 100px;"></textarea>
      </div>
      <div class="input-group full-width">
        <label>Prompts of this Bundle</label>
        <textarea id="val8" oninput="updatePrompt()" style="min-height: 120px;"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Unified Context Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading context...</div>
        <button class="copy-btn" onclick="copyPrompt('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Complete Context</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompt() {
      const v1 = document.getElementById('val1').value || "[Product's Landing Page Link]";
      const v2 = document.getElementById('val2').value || "[Name of the Prompt Bundle]";
      const v3 = document.getElementById('val3').value || "[Tagline]";
      const v4 = document.getElementById('val4').value || "[Description]";
      const v5 = document.getElementById('val5').value || "[Type of Product]";
      const v6 = document.getElementById('val6').value || "[Audience]";
      const v7 = document.getElementById('val7').value || "[AIDA]";
      const v8 = document.getElementById('val8').value || "[Prompts of this Prompt Bundle]";
      const v9 = document.getElementById('val9').value || "[Graphy's Title]";
      const v10 = document.getElementById('val10').value || "[Graphy's Description]";

      const fullPrompt = `CONTEXT

1, Product's Landing Page Link: ${v1}

2, About Product:
Name of the Prompt Bundle: "${v2}"
Tagline: ${v3}
Description: ${v4}
Type of Product: ${v5}
Audience: ${v6}

3, AIDA ভিত্তিক পজিশনিং ও পরিচিতি-

${v7}


4, Prompts of this Prompt Bundle:

${v8}


5, Graphy.com-এর ল্যান্ডিং পেজ Copy:

Title:

${v9}

Description:

${v10}`;

      document.getElementById('finalPrompt').innerText = fullPrompt;
    }

    function copyPrompt(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompt();
  </script>
</body>
</html>
