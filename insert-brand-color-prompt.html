<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insert Brand Colour Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-section {
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      resize: vertical;
      min-height: 120px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 1rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Insert Brand Colour</h1>
      <p class="sub-header">Premium luxury-minimalist visual identity</p>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label>Insert Generated PROMPT Here</label>
        <textarea id="mainInput" placeholder="Paste your generated prompt here..." oninput="updatePrompt()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Final Prompt Box</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading template...</div>
        <button class="copy-btn" onclick="copyPrompt('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Formatted Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const templateRule = `RULE (MANDATORY)

Create a premium luxury-minimalist visual with the emotional identity: “Quiet luxury meets thoughtful modern promotion.”

Use a refined warm luxury palette featuring champagne gold (#C89B3C), metallic bronze (#8B5E1A), soft ivory (#F8F4EC), elegant cream white (#FFFDF8), muted premium browns (#35271A), and sophisticated warm neutral tones.

The visual style should feel calm, sophisticated, trustworthy, editorial, cinematic, and high-end — without appearing loud, flashy, or overly commercial.

Incorporate subtle metallic gold reflections, soft cinematic lighting, warm ambient glow, luxury gradients, refined glassmorphism, elegant depth, and clean minimalist composition.

Style direction: modern luxury branding, elegant editorial aesthetics, premium lifestyle visuals, tasteful product presentation, refined UI design, cinematic warmth, sophisticated minimalism, polished luxury atmosphere, and human-first visual communication.

Maintain a premium “quiet luxury” feel with balanced whitespace, restrained elegance, soft contrast, and visually soothing composition.

Avoid: oversaturated colors, cluttered layouts, aggressive advertising aesthetics, neon tones, cheap-looking gold textures, harsh shadows, cyberpunk styles, cartoonish elements, glossy plastic surfaces, or flashy luxury clichés.`;

    function updatePrompt() {
      const inputVal = document.getElementById('mainInput').value || "[Insert Generated PROMPT Here]";
      
      const finalOutput = `${inputVal}\n\n${templateRule}`;
      
      document.getElementById('finalPrompt').innerText = finalOutput;
    }

    function copyPrompt(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display
    updatePrompt();
  </script>
</body>
</html>
