<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hook Analysis Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-section {
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      resize: vertical;
      min-height: 120px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 1rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .container { padding: 0 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Hook Analysis</h1>
      <p class="sub-header">Reverse-Engineer Psychological Triggers</p>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label>Paste Hook Here</label>
        <textarea id="hookInput" placeholder="e.g. Stop posting content that nobody cares about..." oninput="updatePrompt()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Analysis Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading template...</div>
        <button class="copy-btn" onclick="copyPrompt('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Analysis Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const template = `You are an expert Hook Reverse-Engineering Analyst.

Your task is to deeply analyze the provided hook using the following framework:

Framework:
- Hook = Pattern Interrupt(s) + Core Message
- Core Message = the answer to a specific Trigger Question asked from a particular Angle about a Core Idea

Your job is to reverse-engineer the hook and identify:

1. Pattern Interrupt(s)
2. Type/category of each Pattern Interrupt
3. Core Message
4. The exact Trigger Question that the Core Message answers
5. The Trigger Angle behind that question
6. The underlying Core Belief

--------------------------------------------------
HOOK TO ANALYZE:
"[PASTE_HOOK_HERE]"
--------------------------------------------------

Important Definitions:

- Pattern Interrupt:
Anything in the hook that disrupts audience expectation, breaks scrolling behavior, creates curiosity, emotional tension, contradiction, surprise, novelty, shock, identity friction, or cognitive dissonance.

- Trigger Angle:
The perspective or psychological direction from which the Trigger Question is being asked.
Examples:
    • Fear angle
    • Opportunity angle
    • Status angle
    • Identity angle
    • Contrarian angle
    • Pain angle
    • Curiosity angle
    • Mistake angle
    • Hidden truth angle
    • Efficiency angle
    • Emotional validation angle
    • Social proof angle
    • Transformation angle
    • Survival angle
    • Loss-aversion angle
    • etc.

- Core Belief:
The deepest implicit worldview, assumption, or belief that the hook wants the audience to accept.

Instructions:
- Be highly analytical and explicit.
- Separate surface-level wording from underlying psychology.
- If multiple Pattern Interrupts exist, identify all of them individually.
- Explain WHY each Pattern Interrupt works psychologically.
- Do not give generic answers.
- Infer hidden meaning whenever necessary.

Return the output in the following structure:

# Hook Breakdown

## 1. Pattern Interrupt(s)

### Pattern Interrupt 1
- Text Portion:
- Type:
- Why It Works:

### Pattern Interrupt 2
- Text Portion:
- Type:
- Why It Works:

(continue if more exist)

---

## 2. Core Message
[Write the core message clearly]

---

## 3. Trigger Question
[Write the implied question the hook is answering]

---

## 4. Trigger Angle
- Angle Type:
- Why This Angle Fits:

---

## 5. Core Belief
[Write the underlying belief/worldview]

---

## 6. Psychological Flow of the Hook
Explain step-by-step:
- how the Pattern Interrupt captures attention,
- how curiosity/tension is created,
- how the Core Message resolves it,
- and why the hook becomes compelling.`;

    function updatePrompt() {
      const hookValue = document.getElementById('hookInput').value || "[PASTE HOOK HERE]";
      const updatedPrompt = template.replace('[PASTE_HOOK_HERE]', hookValue);
      document.getElementById('finalPrompt').innerText = updatedPrompt;
    }

    function copyPrompt(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize with default state
    updatePrompt();
  </script>
</body>
</html>
