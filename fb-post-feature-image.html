<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Post Feature Image Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-section {
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      min-height: 150px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom Scrollbar for code box */
    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Facebook Post Feature Image</h1>
      <p class="sub-header">AI Image Prompt Engineering for High CTR</p>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label>Social Media Posts</label>
        <textarea id="postsIn" placeholder="Paste your social media posts here..." oninput="updatePrompt()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Image Generation Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading template...</div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Complete Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const template = `You are an expert AI image prompt engineer specializing in ultra-realistic, emotionally compelling visuals, and a social media marketing expert focused on high click-through rate (CTR) content.

Your task is to create an image for the provided social media post.

MANDATORY 
This image must be a high-quality, ultra-detailed AI image that is not only visually stunning but also deeply aligned with the reader's psychology, struggles, and aspirations and the vibe of the post.

INPUT:

CONTENT:
[Social media posts]

OUTPUT REQUIREMENTS:

For EACH post, generate:

1. Image Concept Title (3 to 6 words)
2. Final Image Prompt (120 to 180 words)
3. Style and Composition Tags (comma-separated)

IMAGE PROMPT STRUCTURE:

Each prompt MUST include:

→ Main subject (person, object, or scene aligned with audience identity)
→ Environment and setting (relatable to audience lifestyle)
→ Time of day
→ Lighting details (cinematic, natural, moody, etc.)
→ Emotional tone (aligned with audience psychology)
→ Human expressions and body language (highly relatable)
→ Background elements that add subtle storytelling
→ Symbolic objects representing struggles or aspirations
→ Color palette (enhancing mood)
→ Camera angle or framing (close-up, wide shot, etc.)
→ Depth, realism, and texture details

CORE CREATIVE RULES:

→ Focus on ultra-realistic, cinematic quality
→ Do NOT include text, logos, or watermarks
→ Avoid generic or cliché imagery
→ Every element must contribute to emotional storytelling
→ Ensure the image feels like a real captured moment

AUDIENCE ALIGNMENT RULES:

→ The image MUST clearly reflect the target audience's identity
→ Depict situations the audience instantly recognizes as their own
→ Capture emotional states that mirror their real internal struggles
→ Include subtle but powerful cues (objects, environment, posture)
→ Make the viewer feel: This is exactly me

RELATABILITY TRIGGER (CRITICAL):

Include at least one instantly recognizable moment, object, or situation that creates immediate personal identification within 1 to 2 seconds.

CTR OPTIMIZATION RULES:

→ Design for scroll-stopping impact
→ Ensure strong subject clarity even at thumbnail size
→ Use composition that naturally draws attention
→ Prefer 4:5 or 1:1 framing for social media
→ Highlight emotional intensity or contrast

ALIGNMENT REQUIREMENT:

The final image MUST align with:

→ The core message of the post
→ AND the psychological profile of the target audience`;

    function updatePrompt() {
      const postsContent = document.getElementById('postsIn').value || "[Social media posts]";
      const updated = template.replace('[Social media posts]', postsContent);
      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalContent;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display
    updatePrompt();
  </script>
</body>
</html>
