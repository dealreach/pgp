<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Idea Analysis Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-section {
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      min-height: 150px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom Scrollbar */
    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Idea Analysis</h1>
      <p class="sub-header">Psychological, Emotional, and Structural Analysis</p>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label>Feelings / Observation / Message</label>
        <textarea id="userInput" placeholder="Insert feelings / observation / message here..." oninput="updatePrompt()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Idea Analysis Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt">Loading template...</div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Complete Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const template = `Please review the feelings / observation / message below that I want to turn into a piece of writing.

Your task is to analyze it psychologically, emotionally, and structurally.

Answer the following questions clearly and separately.

Emotional Core

- এই content-এর মূল emotional feelingটা কি?
- এই content-এর ভিতরে কোনো deeper human truth আছে কি?
- এই content কি reader-কে নিজের জীবনের কিছু মনে করিয়ে দেবে?
- এই content কি emotion থেকে insight-এর দিকে যাচ্ছে?

Psychological & Human Pattern

- এই content-এর ভিতরে কি কোনো familiar contradiction আছে?
- এই content-এর ভিতরে কি broader human behaviour decode করা হচ্ছে?
- এই বিষয়টার ভিতরে কি validation, identity বা attention-এর psychology আছে?
- এই content কি modern loneliness, self-alienation বা digital emptiness touch করছে?

Writing Direction

- এই idea-টা কি খুব ছোট ও sharp form-এ বলা সম্ভব?
- এই content কি reader-কে থামিয়ে চিন্তা করাতে পারে?
- এই বিষয়টা কি conversational tone-এ explore করলে বেশি effective হবে?
- এই content-এর ভিতরে কি example + psychology + observation একসাথে কাজ করছে?
- এই idea-টাকে কি heavy না হয়ে thoughtfulভাবে বলা সম্ভব?
- এই বিষয়টা কি observation দিয়ে শুরু করলে বেশি powerful হবে?
- এই content কি explanation-এর চেয়ে emotional recognition বেশি চায়?
- এই বিষয়টা কি declaration-এর বদলে questioning-এর মাধ্যমে ভালো কাজ করবে?

Structural & Style Fit

- এই content কি কোনো বাস্তব ঘটনা বা বাস্তব behaviour-এর উপর দাঁড়িয়ে আছে?
- এই বিষয়টা কি observation-based analysis চায়?
- এই idea-টা কি inward self-reflection চায়?
- এই content কি vulnerability ছাড়া honest হবে না?
- এই বিষয়টা কি self-questioning-এর মাধ্যমে explore করা বেশি natural?
- এই বিষয়টা কি subtleভাবে philosophical হতে পারে?
- এই content কি recognition → reflection → realisation flow অনুসরণ করছে?

Final Recommendation

Based on the analysis:
- Which writing style fits this idea best?
- Why?
- What tone should the writing have?
- What should be avoided while writing it?

My feelings / observation / message:
[Insert feelings / observation / message here]`;

    function updatePrompt() {
      const inputVal = document.getElementById('userInput').value || "[Insert feelings / observation / message here]";
      const updated = template.replace('[Insert feelings / observation / message here]', inputVal);
      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalContent;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display
    updatePrompt();
  </script>
</body>
</html>
