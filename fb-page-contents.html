<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Page Contents Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .input-section {
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
      text-align: center;
    }

    input[type="text"] {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      transition: all 0.3s;
      outline: none;
      text-align: center;
    }

    input[type="text"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
    }

    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Facebook Page Contents</h1>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label>Product Name</label>
        <input type="text" id="productIn" placeholder="Enter product name..." oninput="updatePrompts()">
      </div>
    </div>

    <div class="prompt-workflow">
      
      <!-- Prompt #1 -->
      <div class="step-card">
        <div class="step-header"><span class="step-label">Prompt #1: Content Pillars</span></div>
        <div class="prompt-content" id="p1Display">Loading prompt template...</div>
        <button class="copy-btn" onclick="copyText('p1Display', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Prompt #1</span>
        </button>
      </div>

      <!-- Prompt #2 -->
      <div class="step-card">
        <div class="step-header"><span class="step-label">Prompt #2: Shareable Posts</span></div>
        <div class="prompt-content" id="p2Display">Loading prompt template...</div>
        <button class="copy-btn" onclick="copyText('p2Display', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Copy Prompt #2</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const p1Template = `Review the uploaded document. It contains the details of my product, [Product Name].

Based on that, give me 10–15 content pillars I can build my brand around on the Facebook Page tailored to this product. For each pillar, include 15–20 subtopics I can create content about.

IMPORTANT RULES (MANDATORY)

Avoid generic or vague subtopics. Each subtopic must be specific, practical, and clear.
Reflect real-life struggles, confusion, and pain points of users.
Use simple, conversational English that feels relatable and easy to understand.
Each content pillar must have a distinct purpose and should not overlap with others.
Subtopics must be actionable so that a user can immediately apply them.
Keep Facebook audience behavior in mind (short attention span, emotional connection, practical value).
Write in a way that builds trust, confidence, and a feeling of “I can do it.”

OUTPUT STRUCTURE (STRICTLY FOLLOW)

Follow this exact structure for each content pillar:

Content Pillar: 
Type / purpose of Contents:
Subtopics (with a high-converting Hook for the subtopic):


Focus on clarity, emotional pull, and practical usefulness.
Avoid complex language. Keep everything simple, relatable, and actionable.`;

    const p2Template = `Review the uploaded document. It contains the details of my product, [Product Name].
Based on that, create 20 Facebook posts using the following hook styles. Each post must be short, relatable, and written for high shareability. Avoid hype. Avoid complex words. Make each post feel like real life experience. No emojis. No hashtags. No quotes around the post. Do not repeat ideas. 
Tone: simple, direct, conversational 
Length: 1 to 3 sentences max 
Use these hook formats: 
1. Major cheat code for life  
2. advice  
3. Hot take  
4. Unpopular opinion  
5. Underrated advice  
6. Pro tip  
7. I don’t know who needs to hear this, but  
8. Facts  
9. The older I get, the more I realize  
10. A massive advantage in   
11. A mentor once told me  
12. Underappreciated advice  
13. A good rule of thumb  
14. Useful rule of thumb  
15. A lesson I wish I learned earlier  
16. Gurus say
17. Friendly reminder  
18. A general rule of [Technique]
19. A friend of mine used to say  
20. One small adult cheat code I really wish I learned earlier  
21. Cheat codes about [Topic] I know at [age] I wish I knew at [younger age]  
22. You don't need [popular thing]. You need [better alternative]  
23. Weird [topic] tip  
24. Nobody wants to talk about this, but it's the real reason why [problem]  
25. Everyone is wrong about [topic]. Here's the truth  
26. You've been lied to about [myth]  
27. The harsh reality about [belief]  
28. What no one tells you  
29. I spent $[amount] to learn this  
30. If you're a [demographic]  
31. If you've ever [scenario], this is for you  
32. [Number] [timeframe] ago: [bad]. Today: [good]  
33. POV: [scenario]  
34. PSA  
35. I'm gonna hold your hand when I tell you this  


Make each post specific to the niche, and make them feel personal but do not use "I" unless required by the hook. Focus on relatable everyday moments.`;

    function updatePrompts() {
      const productName = document.getElementById('productIn').value || "[Product Name]";
      document.getElementById('p1Display').innerText = p1Template.replace(/\[Product Name\]/g, productName);
      document.getElementById('p2Display').innerText = p2Template.replace(/\[Product Name\]/g, productName);
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalContent;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display
    updatePrompts();
  </script>
</body>
</html>
