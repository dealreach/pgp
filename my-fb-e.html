<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Facebook Text Formatter</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f3f3f3;
      padding:16px;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:1400px;
      margin:auto;
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    @media(min-width:992px){
      .container{
        grid-template-columns:1fr 1fr 1fr;
      }
    }

    .card{
      background:#ffffff;
      border-radius:24px;
      padding:20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
      display:flex;
      flex-direction:column;
    }

    .card h2{
      font-size:22px;
      margin-bottom:16px;
    }

    textarea{
      width:100%;
      min-height:320px;
      resize:none;
      border:1px solid #ddd;
      border-radius:18px;
      padding:16px;
      font-size:16px;
      line-height:1.8;
      outline:none;
    }

    textarea:focus{
      border-color:#000;
    }

    .helper{
      margin-top:14px;
      color:#666;
      font-size:14px;
      line-height:1.8;
    }

    .output-card{
      background:#111;
      color:#fff;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .copy-btn{
      border:none;
      background:#fff;
      color:#000;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      transition:0.2s;
    }

    .copy-btn:hover{
      transform:scale(1.03);
    }

    .shortcut-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .shortcut-btn{
      border:none;
      background:#000;
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
      transition:0.2s;
    }

    .shortcut-btn:hover{
      transform:scale(1.03);
    }

    .output{
      flex:1;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:18px;
      padding:18px;
      min-height:320px;
      overflow:auto;
      white-space:pre-wrap;
      line-height:1.9;
      font-size:15px;
    }

    .footer-note{
      margin-top:14px;
      color:#999;
      font-size:12px;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TITLE -->

    <div class="card">

      <h2>১. টাইটেল</h2>

      <textarea
        id="titleInput"
        placeholder="এখানে টাইটেল লিখুন..."
      ></textarea>

      <div class="helper">
        টাইটেলের নিচে অটো ডাবল আন্ডারলাইন (=) তৈরি হবে।
      </div>

    </div>


    <!-- BODY -->

    <div class="card">

      <h2>২. বডি</h2>

      <!-- Shortcut Buttons -->

      <div class="shortcut-buttons">

        <button
          class="shortcut-btn"
          onclick="insertShortcut('n/')"
        >
          + New Line
        </button>

        <button
          class="shortcut-btn"
          onclick="insertShortcut('nn/')"
        >
          + New Paragraph
        </button>

      </div>

      <textarea
        id="bodyInput"
        placeholder="এখানে পোস্ট লিখুন...

n/ = New Line
nn/ = New Paragraph"
      ></textarea>

      <div class="helper">
        <strong>n/</strong> = New Line<br>
        <strong>nn/</strong> = New Paragraph
      </div>

    </div>


    <!-- OUTPUT -->

    <div class="card output-card">

      <div class="top-bar">

        <h2>৩. রিয়াল টাইম আউটপুট</h2>

        <button class="copy-btn" onclick="copyText()">
          Copy Text
        </button>

      </div>

      <div class="output" id="outputPreview">
এখানে formatted output দেখা যাবে...
      </div>

      <div class="footer-note">
        Facebook-ready formatted text preview
      </div>

    </div>

  </div>


  <script>

    const titleInput = document.getElementById('titleInput');
    const bodyInput = document.getElementById('bodyInput');
    const outputPreview = document.getElementById('outputPreview');

    const footer = `—
কপিরাইট © শিবপ্রসাদ মুখার্জি`;



    // Generate underline

    function generateUnderline(text){

      return text
        .split('')
        .map(char => char === ' ' ? ' ' : '=')
        .join('');
    }



    // Convert formatting shortcuts

    function formatBody(text){

      return text
        .replace(/nn\//g, '\n\n')
        .replace(/n\//g, '\n');
    }



    // Insert shortcut into textarea

    function insertShortcut(shortcut){

      const start = bodyInput.selectionStart;
      const end = bodyInput.selectionEnd;

      const text = bodyInput.value;

      bodyInput.value =
        text.substring(0, start) +
        shortcut +
        text.substring(end);

      bodyInput.focus();

      bodyInput.selectionStart =
      bodyInput.selectionEnd =
        start + shortcut.length;

      updateOutput();
    }



    // Update realtime output

    function updateOutput(){

      const title = titleInput.value.trim();
      const body = bodyInput.value;

      let formattedTitle = '';

      if(title){

        formattedTitle =
`${title}
${generateUnderline(title)}`;
      }

      const formattedBody = formatBody(body);

      const finalOutput =
`${formattedTitle}

${formattedBody}

${footer}`.trim();

      outputPreview.textContent = finalOutput;
    }



    // Copy text

    async function copyText(){

      try{

        await navigator.clipboard.writeText(
          outputPreview.textContent
        );

        alert('Formatted text copied successfully!');

      }catch(error){

        alert('Copy failed!');
      }
    }



    // Live update

    titleInput.addEventListener('input', updateOutput);
    bodyInput.addEventListener('input', updateOutput);

    updateOutput();

  </script>

</body>
</html>
